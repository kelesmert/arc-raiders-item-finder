<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Recipe Tree Test</title>
</head>
<body>
  <h1>Recipe Tree Test</h1>
  <pre id="output"></pre>

  <script type="module">
    import {
      loadItems,
      resolveTree,
      resolveMultiple,
      flattenToBaseMaterials,
      groupByLocation
    } from './src/recipeTree.js';

    const out = document.getElementById('output');

    function log(label, data) {
      out.textContent += `\n=== ${label} ===\n` + JSON.stringify(data, null, 2) + '\n';
    }

    async function run() {
      await loadItems('./filtered-items.json');

      // Test 1: Tek eşya ağacı (sterilized_bandage)
      const tree1 = resolveTree('sterilized_bandage', 1);
      log('sterilized_bandage tree', tree1);

      // Test 2: Birden fazla eşya
      const trees = resolveMultiple([
        { id: 'sterilized_bandage', quantity: 2 },
        { id: 'combat_mk2', quantity: 1 },
        { id: 'heavy_shield', quantity: 1 }
      ]);
      log('multiple trees', trees);

      // Test 3: Toplam temel hammaddeler
      const baseMats = flattenToBaseMaterials(trees);
      log('base materials', baseMats);

      // Test 4: Lokasyona göre gruplama
      const byLocation = groupByLocation(baseMats);
      log('by location', byLocation);
    }

    run();
  </script>
</body>
</html>
